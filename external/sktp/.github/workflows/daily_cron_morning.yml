name: Daily Morning Digest Cron

on:
  schedule:
    # 00:00 UTC = 07:00 AM VN Time
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  ping_morning:
    runs-on: ubuntu-latest
    steps:
      - name: Hit Morning Digest API
        run: |
          SECRET_KEY="${{ secrets.CRON_SECRET }}"
          if [ -z "$SECRET_KEY" ]; then
            SECRET_KEY="sukientoanquoc-cron-2026"
          fi
          curl -sX GET "https://sukientoanquoc.com/api/cron/digest/morning?key=${SECRET_KEY}"
