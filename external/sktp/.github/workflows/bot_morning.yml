name: Morning Digest Bot (Telegram)
on:
  schedule:
    # 00:00 UTC tức là ĐÚNG 07:00 Sáng giờ Việt Nam
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Gửi lời chào và danh sách bài sẽ đăng
        run: curl -sL -m 30 "https://sukientoanquoc.com/api/cron/digest/morning?key=sukientoanquoc-cron-2026"
