name: Deploy to VPS

on:
  workflow_dispatch:
    # Deploy thủ công - vào Actions > Deploy to VPS > Run workflow

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_TELEMETRY_DISABLED: 1

      - name: Create deployment package
        run: |
          cd out
          tar -czf ../deploy.tar.gz .

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          echo "Host vps
            HostName ${{ secrets.VPS_HOST }}
            User ${{ secrets.VPS_USERNAME }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Upload and Deploy
        run: |
          echo "Uploading files..."
          cat deploy.tar.gz | ssh vps 'cat > /tmp/deploy.tar.gz'
          
          echo "Deploying..."
          ssh vps 'sudo rm -rf /var/www/html/* && sudo tar -xzf /tmp/deploy.tar.gz -C /var/www/html/ && sudo chown -R www-data:www-data /var/www/html && rm /tmp/deploy.tar.gz && echo "Deploy complete!"'

      - name: Health Check
        run: |
          echo "Waiting 5s for server to stabilize..."
          sleep 5
          HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' "http://${{ secrets.VPS_HOST }}/")
          echo "HTTP Status: $HTTP_STATUS"
          if echo "$HTTP_STATUS" | grep -qE '^(200|301|302)$'; then
            echo "✅ Health check passed!"
          else
            echo "⚠️ Health check returned status $HTTP_STATUS (non-blocking)"
          fi
