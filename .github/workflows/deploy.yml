name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Package Build
        run: |
          zip -r deploy.zip .next public package.json package-lock.json next.config.ts
          
      - name: Transfer to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: deploy.zip
          target: /tmp/

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Backup old HTML folder if needed, but we deploy to the existing path
            sudo unzip -o /tmp/deploy.zip -d /var/www/html/
            sudo chown -R www-data:www-data /var/www/html
            cd /var/www/html
            sudo npm ci --production
            pm2 restart sanuytin || pm2 start npm --name "sanuytin" -- start
            rm /tmp/deploy.zip
            echo '✅ Deployment complete!'

      - name: Telegram Notification on Failure
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d parse_mode="HTML" \
          -d text="🚨 <b>SanUyTin LỖI DEPLOYMENT</b>%0A%0A❌ Việc đẩy code lên VPS thất bại.%0A⚠️ Vui lòng mở Github Action kiểm tra log deploy!"
