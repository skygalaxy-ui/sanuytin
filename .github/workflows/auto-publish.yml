name: Auto Publish Scheduled Posts

on:
  schedule:
    - cron: '30 0 * * *'  # 07:30 VN
    - cron: '0 3 * * *'   # 10:00 VN
    - cron: '30 5 * * *'  # 12:30 VN
    - cron: '0 8 * * *'   # 15:00 VN
    - cron: '0 10 * * *'  # 17:00 VN
    - cron: '0 12 * * *'  # 19:00 VN
    - cron: '0 14 * * *'  # 21:00 VN
  push:
    branches: [ main ]
  workflow_dispatch: # Cho phép chạy thủ công

jobs:
  auto-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Auto-publish scheduled posts
        run: node scripts/auto-publish.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}

      - name: Generate Sitemap
        run: node scripts/generate-sitemap.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Build project
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_TELEMETRY_DISABLED: 1

      - name: Create deployment package
        run: |
          cd out
          tar -czf ../deploy.tar.gz .

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.VPS_SSH_KEY }}
          known_hosts: ${{ secrets.VPS_HOST }} # Sẽ được update tự động bên dưới
          if_key_exists: replace

      - name: Update Known Hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Configure SSH Alias
        run: |
          echo "Host vps
            HostName ${{ secrets.VPS_HOST }}
            User ${{ secrets.VPS_USERNAME }}
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Test SSH Connection
        run: ssh -o BatchMode=yes vps "echo 'SSH Connection Successful!'"

      - name: Upload and Deploy
        run: |
          cat deploy.tar.gz | ssh vps 'cat > /tmp/deploy.tar.gz'
          ssh vps 'sudo rm -rf /var/www/html/* && sudo tar -xzf /tmp/deploy.tar.gz -C /var/www/html/ && sudo chown -R www-data:www-data /var/www/html && rm /tmp/deploy.tar.gz && echo "Deploy complete!"'

      - name: Send Telegram Notification (Success)
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d parse_mode="HTML" \
          -d text="✅ <b>SanUyTin Auto-Publish</b>%0A%0A🚀 Hệ thống tự động đẩy bài và cập nhật 100% lên VPS thành công vòng lặp này!%0A🌐 <a href='https://sanuytin.net'>Kiểm tra ngay</a>"

      - name: Send Telegram Notification (Failure)
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d parse_mode="HTML" \
          -d text="🚨 <b>SanUyTin LỖI ĐĂNG BÀI</b>%0A%0A❌ Sếp ơi chuyến xe Auto-Publish vừa bị ngã ngựa (dừng hình lúc Build hoặc đứt mạng máy chủ).%0A⚠️ Lên Github sửa liền nha sếp!"
