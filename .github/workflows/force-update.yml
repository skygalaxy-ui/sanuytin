name: Force Update VPS

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          echo "Host vps
            HostName ${{ secrets.VPS_HOST }}
            User ${{ secrets.VPS_USERNAME }}
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            ServerAliveInterval 60" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Force update on VPS
        run: |
          ssh vps 'bash -s' << 'ENDSSH'
            set -e
            if [ -d ~/sanuytin ]; then
              cd ~/sanuytin
            elif [ -d /home/viralworks/sanuytin ]; then
              cd /home/viralworks/sanuytin
            elif [ -d /home/hoangphuongle.nt/sanuytin ]; then
              cd /home/hoangphuongle.nt/sanuytin
            else
              echo "❌ Không tìm thấy thư mục sanuytin!"
              exit 1
            fi
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            git pull origin main
            npm install
            npm run build
            pm2 restart all
            echo "✅ Force update thành công!"
          ENDSSH
