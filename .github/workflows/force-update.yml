name: Force Update VPS

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.VPS_SSH_KEY }}
          known_hosts: 'just-a-placeholder-so-we-dont-get-errors'
      
      - name: Adding Known Hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Force update on VPS
        run: |
          ssh ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} 'cd ~/sanuytin || cd /home/viralworks/sanuytin || cd /home/hoangphuongle.nt/sanuytin && git pull origin main && export PATH=$PATH:/home/${{ secrets.VPS_USERNAME }}/.nvm/versions/node/v22/bin:/root/.nvm/versions/node/v22.14.0/bin && npm run build && pm2 restart all'
